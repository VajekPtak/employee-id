<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee ID</title>

<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { overflow: hidden; text-align: center; background: black; }

    /* Background Video */
    #video-container {
        position: fixed;
        top: 0; left: 0; width: 100vw; height: 100vh;
        overflow: hidden;
        z-index: -1;
    }
    #video-bg {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* Clock */
    #clock {
        position: absolute;
        top: 6vh;
        right: 14vw;
        font-size: 4vw;
        font-weight: bold;
        color: white;
    }

    /* Name Input */
    #name-box {
        position: absolute;
        top: 45vh;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 5vw;
        font-weight: bold;
        color: black;
    }
    #name-input {
        font-size: 4vw;
        padding: 0.5vh 1vw;
        background: transparent;
        border: none;
        color: black;
        text-align: center;
        font-weight: bold;
    }
    #name-input:focus {
        outline: none;
    }

    /* Profile Photo */
    #photo {
        position: absolute;
        top: 23vh;
        left: 50.5%;
        transform: translateX(-50%);
        width: 33vw;
        height: auto;
        max-height: 40vh;
        object-fit: cover;
        border-radius: 8px;
    }

    /* Upload button */
    #photo-upload {
        position: absolute;
        bottom: 2vh;
        left: 2vw;
        color: white;
        font-size: 3vw;
    }
</style>
</head>

<body>

<!-- Background Video -->
<div id="video-container">
    <video id="video-bg" autoplay loop muted playsinline>
        <source src="assets/background_crop.mp4" type="video/mp4">
    </video>
</div>

<!-- Clock -->
<div id="clock"></div>

<!-- Name -->
<div id="name-box">
    <input type="text" id="name-input" placeholder="Enter your name" oninput="updateName()">
</div>

<!-- Upload -->
<input type="file" id="photo-upload" accept="image/*" onchange="loadPhoto(event)">
<img id="photo" src="" alt="Your Photo">

<script>
    // CLOCK
    function updateClock() {
        let now = new Date();
        document.getElementById("clock").innerText = now.toLocaleString();
    }
    setInterval(updateClock, 1000);
    updateClock();

    // NAME SAVE
    function updateName() {
        let name = document.getElementById("name-input").value;
        localStorage.setItem("userName", name);
    }

    function loadName() {
        let savedName = localStorage.getItem("userName");
        if (savedName) {
            document.getElementById("name-input").value = savedName;
        }
    }

    // PHOTO SAVE
    function loadPhoto(event) {
        let file = event.target.files[0];
        if (!file) return;

        let reader = new FileReader();

        reader.onload = function(e) {
            let photo = document.getElementById("photo");
            photo.src = e.target.result;

            // Save to localStorage
            localStorage.setItem("userPhoto", e.target.result);
        };

        reader.readAsDataURL(file);
    }

    function loadSavedPhoto() {
        let savedPhoto = localStorage.getItem("userPhoto");
        if (savedPhoto) {
            document.getElementById("photo").src = savedPhoto;
        }
    }

    // INIT
    document.addEventListener('DOMContentLoaded', function () {
        let video = document.getElementById('video-bg');

        video.play().catch(() => {
            video.muted = true;
            video.play();
        });

        loadName();
        loadSavedPhoto();
    });
</script>

</body>
</html>
